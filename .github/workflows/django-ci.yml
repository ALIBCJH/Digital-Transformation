name: Django Production CI

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  packages: write

# Standard variables used across jobs
env:
  PYTHON_VERSION: '3.11'
  # Registry URL for GitHub's free container storage
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 1. QUALITY CONTROL JOB
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'apps/backend/requirements.txt'

      - name: Install Dependencies
        working-directory: ./apps/backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install safety bandit # Standard tooling

      - name: Linting (Code Style with Ruff)
        working-directory: ./apps/backend
        run: ruff check . --output-format=github --ignore=E501

      - name: Security Audit (Packages & Code)
        working-directory: ./apps/backend
        run: |
          safety check
          bandit -r . -ll

      - name: Run Django Tests
        working-directory: ./apps/backend
        env:
          SECRET_KEY: "temporary-key-for-testing"
          DJANGO_SETTINGS_MODULE: "config.ci_settings"
        run: |
          # Create tables without migrations to avoid PostgreSQL-specific indexes
          python manage.py migrate --run-syncdb
          python manage.py test

  # 2. PACKAGING JOB (Artifact Verification)
  build-and-push-docker:
    needs: test-and-lint # RULE: Only build if tests are green
    runs-on: ubuntu-latest
    # Permissions required to write to the GitHub Container Registry
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use registry cache which is more reliable than GHA cache
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
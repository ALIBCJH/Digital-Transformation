name: Django Production CI

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  packages: write
  id-token: write # REQUIRED for OIDC authentication with AWS

env:
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  IMAGE_NAME: alibcjh/digital-transformation
  AWS_REGION: eu-north-1

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'apps/backend/requirements.txt'
      - name: Install Dependencies
        working-directory: ./apps/backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install safety bandit
      - name: Linting (Code Style with Ruff)
        working-directory: ./apps/backend
        run: ruff check . --output-format=github --ignore=E501
      - name: Security Audit (Packages & Code)
        working-directory: ./apps/backend
        run: |
          safety check
          bandit -r . -ll
      - name: Run Django Tests
        working-directory: ./apps/backend
        env:
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY || 'test-key-for-ci-only-not-production' }}
          DJANGO_SETTINGS_MODULE: "config.ci_settings"
        run: |
          python manage.py migrate --run-syncdb
          python manage.py test

  build-and-push-docker:
    needs: test-and-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy-to-aws:
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    # 🔒 SECURITY: Only deploy main branch to production
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- OIDC AUTHENTICATION ---
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # --- DEPLOYMENT via SSM with Error Handling ---
      - name: Deploy to AWS EC2
        id: deploy
        run: |
          # Send deployment command and capture command ID
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets '[{"Key":"InstanceIds","Values":["${{ secrets.EC2_INSTANCE_ID }}"]}]' \
            --parameters '{
              "commands": [
                "set -e",
                "echo Logging into GitHub Container Registry...",
                "echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin",
                "echo Pulling new image...",
                "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}",
                "echo Creating backup of current container...",
                "docker rename backend backend-backup 2>/dev/null || echo No existing container to backup",
                "echo Starting new container...",
                "docker run -d --name backend --restart unless-stopped -p 8000:8000 \\",
                "  -e SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }} \\",
                "  -e DEBUG=False \\",
                "  -e DATABASE_URL=${{ secrets.DATABASE_URL }} \\",
                "  -e ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }} \\",
                "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}",
                "echo Waiting for container to be healthy...",
                "sleep 5",
                "if ! docker ps | grep -q backend; then",
                "  echo ERROR: Container failed to start!",
                "  docker logs backend || true",
                "  echo Rolling back to previous version...",
                "  docker stop backend 2>/dev/null || true",
                "  docker rm backend 2>/dev/null || true",
                "  docker rename backend-backup backend 2>/dev/null || true",
                "  docker start backend 2>/dev/null || true",
                "  exit 1",
                "fi",
                "echo Container started successfully",
                "docker logs --tail 50 backend",
                "echo Cleaning up old backup...",
                "docker stop backend-backup 2>/dev/null || true",
                "docker rm backend-backup 2>/dev/null || true",
                "echo Pruning old images...",
                "docker image prune -af --filter until=24h",
                "echo Deployment completed successfully"
              ]
            }' \
            --output text \
            --query "Command.CommandId")
          
          echo "Command ID: $COMMAND_ID"
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          
          # Wait for command to complete (max 5 minutes)
          echo "Waiting for deployment to complete..."
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --timeout 300 || {
              echo "❌ Deployment timed out or failed"
              exit 1
            }
      
      # --- VERIFY DEPLOYMENT ---
      - name: Verify Deployment
        run: |
          # Get command execution details
          STATUS=$(aws ssm get-command-invocation \
            --command-id "${{ steps.deploy.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "Status" \
            --output text)
          
          echo "Deployment Status: $STATUS"
          
          if [ "$STATUS" != "Success" ]; then
            echo "❌ Deployment failed with status: $STATUS"
            
            # Get error output
            aws ssm get-command-invocation \
              --command-id "${{ steps.deploy.outputs.command_id }}" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "StandardErrorContent" \
              --output text
            
            exit 1
          fi
          
          echo "✅ Deployment completed successfully"
          
      # --- NOTIFY ON FAILURE ---
      - name: Notify on Failure
        if: failure()
        run: |
          echo "::error::🚨 Production deployment failed for commit ${{ github.sha }}"
          echo "::error::Check logs above for details"
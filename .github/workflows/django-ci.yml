name: Django Production CI

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  packages: write
  id-token: write # REQUIRED for OIDC authentication with AWS

env:
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  # Ensure this matches your image name in GHCR
  IMAGE_NAME: alibcjh/digital-transformation 

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'apps/backend/requirements.txt'
      - name: Install Dependencies
        working-directory: ./apps/backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install 'safety>=3.2,<4.0' 'bandit[toml]>=1.7,<2.0'
      - name: Linting (Code Style with Ruff)
        working-directory: ./apps/backend
        run: ruff check . --output-format=github --ignore=E501
      - name: Security Audit (Packages & Code)
        working-directory: ./apps/backend
        run: |
          safety check
          bandit -r . -ll
      - name: Run Django Tests
        working-directory: ./apps/backend
        env:
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY || 'test-key-for-ci-only-not-production' }}
          DJANGO_SETTINGS_MODULE: "config.ci_settings"
        run: |
          python manage.py migrate --run-syncdb
          python manage.py test

  build-and-push-docker:
    needs: test-and-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy-to-aws:
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    # 🔒 SECURITY: Only deploy main branch to production
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- OIDC AUTHENTICATION ---
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          port: 22
          script: |
            # Login to GitHub Container Registry
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull the latest image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            
            # Stop and remove old container
            docker stop backend || true
            docker rm backend || true
            
            # Run new container
            docker run -d --name backend \
              --restart unless-stopped \
              -p 8000:8000 \
              -e SECRET_KEY="${{ secrets.DJANGO_SECRET_KEY }}" \
              -e DEBUG="False" \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e ALLOWED_HOSTS="${{ secrets.ALLOWED_HOSTS }}" \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            
            # Clean up old images
            docker image prune -af
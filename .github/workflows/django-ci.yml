name: Django Production CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  packages: write

# Standard variables used across jobs
env:
  PYTHON_VERSION: '3.11'
  # Registry URL for GitHub's free container storage
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 1. QUALITY CONTROL JOB
  test-and-lint:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 safety bandit # Standard tooling

      - name: Linting (Code Style)
        run: flake8 . --count --max-line-length=127 --statistics --exclude=venv,migrations

      - name: Security Audit (Packages & Code)
        run: |
          safety check
          bandit -r . -ll

      - name: Run Django Tests
        env:
          SECRET_KEY: "temporary-key-for-testing"
          DB_ENGINE: "django.db.backends.postgresql"
          DB_NAME: "test_db"
          DB_USER: "postgres"
          DB_PASSWORD: "postgres"
          DB_HOST: "localhost"
          DB_PORT: "5432"
        run: |
          python manage.py makemigrations --check --dry-run
          python manage.py test

  # 2. PACKAGING JOB (Artifact Verification)
  build-and-push-docker:
    needs: test-and-lint # RULE: Only build if tests are green
    runs-on: ubuntu-latest
    # Permissions required to write to the GitHub Container Registry
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true # Now we are actually saving the "Artifact"
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Caching makes subsequent builds much faster
          cache-from: type=gha
          cache-to: type=gha,mode=max
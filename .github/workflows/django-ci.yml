name: Django CI

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt || pip install django djangorestframework djangorestframework-simplejwt psycopg2-binary python-decouple

    - name: Run migrations
      env:
        SECRET_KEY: "django-insecure-test-key-for-github-actions-only"
        DEBUG: "True"
        ALLOWED_HOSTS: "localhost,127.0.0.1"
        DB_ENGINE: "django.db.backends.postgresql"
        DB_NAME: "test_db"
        DB_USER: "postgres"
        DB_PASSWORD: "postgres"
        DB_HOST: "localhost"
        DB_PORT: "5432"
      run: |
        python manage.py makemigrations
        python manage.py migrate

    - name: Run tests
      env:
        SECRET_KEY: "django-insecure-test-key-for-github-actions-only"
        DEBUG: "True"
        ALLOWED_HOSTS: "localhost,127.0.0.1"
        DB_ENGINE: "django.db.backends.postgresql"
        DB_NAME: "test_db"
        DB_USER: "postgres"
        DB_PASSWORD: "postgres"
        DB_HOST: "localhost"
        DB_PORT: "5432"
      run: |
        python manage.py test

    - name: Check for missing migrations
      env:
        SECRET_KEY: "django-insecure-test-key-for-github-actions-only"
        DEBUG: "True"
        ALLOWED_HOSTS: "localhost,127.0.0.1"
        DB_ENGINE: "django.db.backends.postgresql"
        DB_NAME: "test_db"
        DB_USER: "postgres"
        DB_PASSWORD: "postgres"
        DB_HOST: "localhost"
        DB_PORT: "5432"
      run: |
        python manage.py makemigrations --check --dry-run

    - name: Django Check
      env:
        SECRET_KEY: "django-insecure-test-key-for-github-actions-only"
        DEBUG: "True"
        ALLOWED_HOSTS: "localhost,127.0.0.1"
        DB_ENGINE: "django.db.backends.postgresql"
        DB_NAME: "test_db"
        DB_USER: "postgres"
        DB_PASSWORD: "postgres"
        DB_HOST: "localhost"
        DB_PORT: "5432"
      run: |
        python manage.py check

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=venv,migrations,__pycache__

  security:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit

    - name: Security check with Safety
      run: |
        pip install -r requirements.txt || pip install django djangorestframework djangorestframework-simplejwt psycopg2-binary python-decouple
        safety check --json || true

    - name: Security check with Bandit
      run: |
        bandit -r . -ll -f json -o bandit-report.json || true
        cat bandit-report.json

    - name: Upload Bandit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-security-report
        path: bandit-report.json

name: Django Production CI

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  packages: write
  id-token: write # REQUIRED for OIDC authentication with AWS

env:
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  # Ensure this matches your image name in GHCR
  IMAGE_NAME: alibcjh/digital-transformation 
  AWS_REGION: us-east-1 # Change to your actual AWS region

jobs:
  # 1. QUALITY CONTROL JOB
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'apps/backend/requirements.txt'
      - name: Install Dependencies
        working-directory: ./apps/backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install safety bandit
      - name: Linting (Code Style with Ruff)
        working-directory: ./apps/backend
        run: ruff check . --output-format=github --ignore=E501
      - name: Security Audit (Packages & Code)
        working-directory: ./apps/backend
        run: |
          safety check
          bandit -r . -ll
      - name: Run Django Tests
        working-directory: ./apps/backend
        env:
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY || 'test-key-for-ci-only-not-production' }}
          DJANGO_SETTINGS_MODULE: "config.ci_settings"
        run: |
          python manage.py migrate --run-syncdb
          python manage.py test

  # 2. PACKAGING & VERIFICATION JOB
  build-and-push-docker:
    needs: test-and-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short

      # --- BUILD AND PUSH ---
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  # 3. DEPLOYMENT TO AWS EC2
  deploy-to-aws:
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- OIDC AUTHENTICATION ---
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }} # The Role ARN you created
          aws-region: ${{ env.AWS_REGION }}

      # --- DEPLOYMENT ---
      # This step assumes you have a script on your EC2 instance or use AWS SSM
      - name: Deploy to AWS EC2
        run: |
          # Example using AWS Systems Manager (SSM) to run a command remotely
          # without needing SSH open on the internet.
          
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets '[{"Key":"InstanceIds","Values":["${{ secrets.EC2_INSTANCE_ID }}"]}]' \
            --parameters 'commands=[
              "docker login ghcr.io -u ${{ github.actor }} --password-stdin",
              "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}",
              "docker stop backend || true",
              "docker rm backend || true",
              "docker run -d --name backend --restart unless-stopped -p 8000:8000 -e SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }} -e DEBUG=False -e DATABASE_URL=${{ secrets.DATABASE_URL }} -e ALLOWED_HOSTS=* ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}",
              "docker image prune -af"
            ]'
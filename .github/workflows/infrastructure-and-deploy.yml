name: Infrastructure & Deployment Pipeline

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Manual trigger
    inputs:
      force_unlock:
        description: 'Force unlock Terraform state (enter lock ID or leave empty)'
        required: false
        default: ''
        type: string

permissions:
  contents: read
  packages: write
  pull-requests: write  # Required for PR comments
  issues: write         # Required for issue/PR comments
  id-token: write       # REQUIRED for OIDC authentication with AWS

env:
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: alibcjh/digital-transformation-backend
  FRONTEND_IMAGE_NAME: alibcjh/digital-transformation-frontend
  AWS_REGION: eu-north-1
  TERRAFORM_VERSION: '1.7.0'
  TERRAFORM_DIR: './Infra/aws'

jobs:
  # ==========================================
  # JOB 1: TERRAFORM INFRASTRUCTURE
  # ==========================================
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    outputs:
      ec2_instance_id: ${{ steps.tf_output.outputs.instance_id }}
      rds_endpoint: ${{ steps.tf_output.outputs.rds_endpoint }}
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: true

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Format Check
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init

      - name: Manual Force Unlock (if requested)
        if: github.event.inputs.force_unlock != ''
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          echo "Force unlocking state with Lock ID: ${{ github.event.inputs.force_unlock }}"
          terraform force-unlock -force "${{ github.event.inputs.force_unlock }}"
          echo "✅ State unlocked successfully"

      - name: Import Existing Resources (if needed)
        working-directory: ${{ env.TERRAFORM_DIR }}
        continue-on-error: true
        run: |
          # Import existing resources that were created locally
          terraform import aws_s3_bucket.terraform_state juma-terraform-state-storage-2026 || true
          terraform import aws_dynamodb_table.terraform_locks terraform-state-locking || true
          terraform import aws_iam_role.ec2_ssm_role juma-ec2-ssm-role-v3 || true
          terraform import aws_iam_role_policy_attachment.ssm_policy juma-ec2-ssm-role-v3/arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore || true
          terraform import aws_iam_instance_profile.ssm_profile juma-ssm-instance-profile-v3 || true
          terraform import aws_key_pair.generated_key juma-stockholm-key-v3 || true

      - name: Terraform Validate
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          terraform plan \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -out=tfplan \
            -no-color | tee plan_output.txt
        continue-on-error: true

      - name: Check for Stale State Lock
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.plan.outcome == 'failure'
        working-directory: ${{ env.TERRAFORM_DIR }}
        continue-on-error: true
        run: |
          echo "Checking for stale Terraform state lock..."
          # Extract lock ID from error message if present
          LOCK_ID=$(grep -oP 'ID:\s+\K[a-f0-9-]+' plan_output.txt || echo "")
          if [ -n "$LOCK_ID" ]; then
            echo "Found stale lock: $LOCK_ID"
            echo "Attempting to force unlock..."
            terraform force-unlock -force "$LOCK_ID" || echo "Failed to unlock, will retry plan"
          fi

      - name: Retry Terraform Plan (if lock was cleared)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.plan.outcome == 'failure'
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          echo "Retrying plan after lock cleanup..."
          terraform plan \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -out=tfplan \
            -no-color | tee plan_output_retry.txt
        continue-on-error: true

      - name: Upload Terraform Plan
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.TERRAFORM_DIR }}/tfplan
          retention-days: 5

      - name: Terraform Plan Status Check
        if: steps.plan.outcome == 'failure'
        run: |
          echo "::error::Terraform Plan Failed"
          exit 1

      - name: Generate Plan Summary
        if: always()
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          echo "### 📊 Terraform Plan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ steps.plan.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f plan_output.txt ]; then
            echo "<details><summary>View Terraform Plan</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```terraform' >> $GITHUB_STEP_SUMMARY
            cat plan_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment PR with Terraform Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.existsSync('${{ env.TERRAFORM_DIR }}/plan_output.txt') 
              ? fs.readFileSync('${{ env.TERRAFORM_DIR }}/plan_output.txt', 'utf8')
              : 'Plan output not available';
            
            const output = `#### 🏗️ Terraform Plan Results
            
            **Status**: ${{ steps.plan.outcome }}
            **Triggered by**: @${{ github.actor }}
            
            <details><summary>📋 View Full Terraform Plan</summary>
            
            \`\`\`terraform
            ${planOutput}
            \`\`\`
            
            </details>
            
            ---
            💡 **Next Steps**: 
            - Review the plan above
            - If changes look good, approve and merge this PR
            - Merging to \`main\` will automatically apply these changes
            
            *Workflow run: [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Apply
        # Only apply on main branch, not on PRs
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: apply
        working-directory: ${{ env.TERRAFORM_DIR }}
        timeout-minutes: 30
        run: |
          terraform apply -auto-approve \
            -var="db_password=${{ secrets.DB_PASSWORD }}"

      - name: Cleanup on Failure
        if: always() && (steps.apply.outcome == 'failure' || steps.apply.outcome == 'cancelled')
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          echo "Apply failed or was cancelled. Checking for locks..."
          # This will show any active locks but won't break the workflow
          terraform state list || true
          echo "If there's a persistent lock, manual cleanup may be needed."
          echo "Run: terraform force-unlock <LOCK_ID>"

      - name: Capture Terraform Outputs
        id: tf_output
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          echo "instance_id=$(terraform output -raw ec2_instance_id || echo '')" >> $GITHUB_OUTPUT
          echo "rds_endpoint=$(terraform output -raw rds_endpoint || echo '')" >> $GITHUB_OUTPUT
          echo "ec2_public_ip=$(terraform output -raw ec2_public_ip || echo '')" >> $GITHUB_OUTPUT
          
      - name: Display Captured Outputs
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "Instance ID: ${{ steps.tf_output.outputs.instance_id }}"
          echo "RDS Endpoint: ${{ steps.tf_output.outputs.rds_endpoint }}"
          echo "EC2 Public IP: ${{ steps.tf_output.outputs.ec2_public_ip }}"

  # ==========================================
  # JOB 2: TEST & LINT
  # ==========================================
  test-and-lint:
    name: Test & Lint Application
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'apps/backend/requirements.txt'
          
      - name: Install Dependencies
        working-directory: ./apps/backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install 'safety>=3.2,<4.0' 'bandit[toml]>=1.7,<2.0'
          
      - name: Linting (Ruff)
        working-directory: ./apps/backend
        run: ruff check . --output-format=github --ignore=E501
        
      - name: Security Audit
        working-directory: ./apps/backend
        run: |
          safety check
          bandit -r . -ll
          
      - name: Run Django Tests
        working-directory: ./apps/backend
        env:
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY || 'test-key-for-ci-only-not-production' }}
          DJANGO_SETTINGS_MODULE: "config.ci_settings"
        run: |
          python manage.py migrate --run-syncdb
          python manage.py test

  # ==========================================
  # JOB 3: BUILD & PUSH DOCKER IMAGES
  # ==========================================
  build-and-push-docker:
    name: Build & Push Docker Images
    needs: [terraform, test-and-lint]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- BACKEND IMAGE BUILD ---
      - name: Extract Backend Metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/alibcjh/digital-transformation-backend
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:buildcache,mode=max

      # --- FRONTEND IMAGE BUILD ---
      - name: Extract Frontend Metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/alibcjh/digital-transformation-frontend
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=/api
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:buildcache,mode=max

  # ==========================================
  # JOB 4: DEPLOY TO AWS EC2
  # ==========================================
  deploy-to-aws:
    name: Deploy to AWS EC2
    needs: [terraform, build-and-push-docker]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate Instance ID
        id: validate_instance
        run: |
          TERRAFORM_INSTANCE='${{ needs.terraform.outputs.ec2_instance_id }}'
          FALLBACK_INSTANCE='${{ secrets.EC2_INSTANCE_ID }}'
          
          # Use Terraform output if valid, otherwise use fallback
          if [[ "$TERRAFORM_INSTANCE" =~ ^i-[a-f0-9]{17}$ ]]; then
            echo "Using Terraform output: $TERRAFORM_INSTANCE"
            echo "instance_id=$TERRAFORM_INSTANCE" >> $GITHUB_OUTPUT
          elif [[ "$FALLBACK_INSTANCE" =~ ^i-[a-f0-9]{17}$ ]]; then
            echo "Using fallback secret: $FALLBACK_INSTANCE"
            echo "instance_id=$FALLBACK_INSTANCE" >> $GITHUB_OUTPUT
          else
            echo "::error::No valid EC2 instance ID found. Terraform output: '$TERRAFORM_INSTANCE', Fallback: '$FALLBACK_INSTANCE'"
            exit 1
          fi

      - name: Deploy Frontend & Backend to EC2 via SSM
        env:
          INSTANCE_ID: ${{ steps.validate_instance.outputs.instance_id }}
        run: |
          echo "Deploying to instance: $INSTANCE_ID"
          
          # Get EC2 Public IP for ALLOWED_HOSTS
          echo "Fetching EC2 public IP..."
          EC2_PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids $INSTANCE_ID \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "EC2 Public IP: $EC2_PUBLIC_IP"
          
          # Wait for instance to be ready (if just created)
          aws ec2 wait instance-status-ok --instance-ids $INSTANCE_ID || true
          
          # Check if SSM agent is available
          echo "Checking SSM agent availability..."
          for i in {1..12}; do
            if aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null | grep -q "Online"; then
              echo "✅ SSM agent is online"
              break
            fi
            echo "Waiting for SSM agent... (attempt $i/12)"
            sleep 10
          done
          
          # Verify docker-compose file exists
          if [ ! -f docker-compose.prod.yml ]; then
            echo "❌ Error: docker-compose.prod.yml not found in repository root"
            exit 1
          fi
          
          # Create base64 encoded docker-compose file
          COMPOSE_B64=$(base64 -w 0 docker-compose.prod.yml)
          if [ -z "$COMPOSE_B64" ]; then
            echo "❌ Error: Failed to encode docker-compose.prod.yml"
            exit 1
          fi
          echo "✅ Docker compose file encoded successfully"
          
          # Send deployment command and capture command ID
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "[{\"Key\":\"InstanceIds\",\"Values\":[\"$INSTANCE_ID\"]}]" \
            --parameters "commands=[
              \"set -e\",
              \"echo '=== Starting Deployment ($(date)) ===' \",
              \"cd /home/ubuntu || cd ~ \",
              \"echo 'Current directory:' && pwd \",
              \"echo 'Logging into GitHub Container Registry...' \",
              \"echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin 2>&1 | grep -i 'login succeeded' || exit 1 \",
              \"echo '✅ Docker login successful' \",
              \"echo 'Creating docker-compose file...' \",
              \"echo '${COMPOSE_B64}' | base64 -d > docker-compose.yml \",
              \"if [ ! -s docker-compose.yml ]; then echo '❌ docker-compose.yml is empty'; exit 1; fi \",
              \"echo '✅ docker-compose.yml created' \",
              \"echo 'Creating .env file with cat heredoc (overwrites any manual edits)...' \",
              \"cat > .env <<'ENV_EOF'\",
              \"# Auto-generated by GitHub Actions - DO NOT EDIT MANUALLY\",
              \"# Last updated: $(date -u +%Y-%m-%dT%H:%M:%SZ)\",
              \"# Commit: ${{ github.sha }}\",
              \"\",
              \"# Docker Images (SHA-tagged for immutability)\",
              \"BACKEND_IMAGE=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:sha-$(echo ${{ github.sha }} | cut -c1-7)\",
              \"FRONTEND_IMAGE=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:sha-$(echo ${{ github.sha }} | cut -c1-7)\",
              \"\",
              \"# Django Configuration\",
              \"DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}\",
              \"DEBUG=False\",
              \"\",
              \"# Database Configuration\",
              \"DATABASE_URL=${{ secrets.DATABASE_URL }}\",
              \"DB_NAME=${{ secrets.DB_NAME }}\",
              \"DB_USER=${{ secrets.DB_USER }}\",
              \"DB_PASSWORD=${{ secrets.DB_PASSWORD }}\",
              \"DB_HOST=${{ secrets.DB_HOST }}\",
              \"DB_PORT=${{ secrets.DB_PORT }}\",
              \"\",
              \"# Security & Host Configuration\",
              \"ALLOWED_HOSTS=localhost,127.0.0.1,backend,${EC2_PUBLIC_IP},${{ secrets.ALLOWED_HOSTS }}\",
              \"SECURE_SSL_REDIRECT=False\",
              \"SESSION_COOKIE_SECURE=False\",
              \"CSRF_COOKIE_SECURE=False\",
              \"ENV_EOF\",
              \"if [ ! -s .env ]; then echo '❌ .env file is empty'; exit 1; fi \",
              \"echo '✅ .env file created and populated' \",
              \"echo 'Preview of .env (secrets masked):' \",
              \"grep -v -E '(SECRET|PASSWORD|DATABASE_URL)' .env || echo 'All vars contain secrets' \",
              \"echo 'Detecting Docker Compose version...' \",
              \"if docker compose version >/dev/null 2>&1; then export COMPOSE_CMD='docker compose' && echo '✅ Using Docker Compose V2'; elif docker-compose version >/dev/null 2>&1; then export COMPOSE_CMD='docker-compose' && echo '✅ Using Docker Compose V1'; else echo '❌ Docker Compose not found' && exit 1; fi \",
              \"echo \\\"Compose command: \$COMPOSE_CMD\\\" \",
              \"echo 'Cleaning up old containers first...' \",
              \"docker stop backend frontend 2>/dev/null || echo 'No running containers to stop' \",
              \"docker rm -f backend frontend 2>/dev/null || echo 'No existing containers to remove' \",
              \"echo 'Pulling latest images...' \",
              \"\$COMPOSE_CMD --env-file .env pull \",
              \"echo 'Stopping any remaining containers via compose...' \",
              \"\$COMPOSE_CMD down --remove-orphans 2>/dev/null || echo 'No compose stack to stop' \",
              \"echo 'Creating app-network if it does not exist...' \",
              \"docker network create app-network 2>/dev/null || echo 'Network already exists' \",
              \"echo 'Starting new containers...' \",
              \"\$COMPOSE_CMD --env-file .env up -d \",
              \"echo 'Waiting for containers to initialize (45s to align with healthcheck start period)...' \",
              \"sleep 45 \",
              \"echo 'Container status:' \",
              \"docker ps -a \",
              \"echo 'Verifying backend container is running...' \",
              \"if ! docker ps --format '{{.Names}}' | grep -q '^backend$'; then \",
              \"  echo '❌ Backend container not running!' \",
              \"  docker logs backend 2>&1 || echo 'No logs available' \",
              \"  exit 1 \",
              \"fi \",
              \"echo '✅ Backend container is running' \",
              \"echo 'Cleaning up old images and unused Docker resources...' \",
              \"docker image prune -af --filter 'until=24h' \",
              \"docker system prune -f --volumes \",
              \"echo '✅ Cleanup completed, disk space freed' \",
              \"echo '✅ Deployment completed successfully at $(date)!' \"
            ]" \
            --output text \
            --query "Command.CommandId")
          
          echo "Deployment command ID: $COMMAND_ID"
          echo "Waiting for deployment to complete..."
          
          # Wait for command to complete (max 5 minutes)
          for i in {1..60}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            
            echo "Deployment status: $STATUS (check $i/60)"
            
            if [ "$STATUS" = "Success" ]; then
              echo "✅ Deployment completed successfully"
              echo "=== Deployment Output ==="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardOutputContent" \
                --output text
              break
            elif [ "$STATUS" = "Failed" ]; then
              echo "❌ Deployment failed"
              echo "=== Error Output ==="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi
            
            sleep 5
          done
          
          # Final status check
          if [ "$STATUS" != "Success" ]; then
            echo "❌ Deployment timed out or failed. Final status: $STATUS"
            exit 1
          fi

      - name: Run Database Migrations (with Retry Logic)
        env:
          INSTANCE_ID: ${{ steps.validate_instance.outputs.instance_id }}
        run: |
          echo "╔═══════════════════════════════════════════════════════════╗"
          echo "║       DATABASE MIGRATION - ROBUST EXECUTION               ║"
          echo "╚═══════════════════════════════════════════════════════════╝"
          echo "Instance ID: $INSTANCE_ID"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          
          # Read the migration script
          MIGRATION_SCRIPT=$(cat .github/scripts/run-migrations-robust.sh | base64 -w 0)
          
          # Function to run migrations with comprehensive checks
          run_migration_attempt() {
            local attempt=$1
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔄 Migration Attempt $attempt of 3"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            COMMAND_ID=$(aws ssm send-command \
              --document-name "AWS-RunShellScript" \
              --targets "[{\"Key\":\"InstanceIds\",\"Values\":[\"$INSTANCE_ID\"]}]" \
              --timeout-seconds 300 \
              --parameters "commands=[
                \"cd /home/ubuntu || cd ~ \",
                \"echo '$MIGRATION_SCRIPT' | base64 -d > migrate-run.sh\",
                \"chmod +x migrate-run.sh\",
                \"./migrate-run.sh\"
              ]" \
              --comment "Migration attempt $attempt - triggered by ${{ github.actor }}" \
              --output text \
              --query "Command.CommandId")
            
            echo "📝 SSM Command ID: $COMMAND_ID"
            echo "⏳ Waiting for migration to complete (timeout: 5 minutes)..."
            echo ""
            
            # Wait for command to complete (max 5 minutes = 60 checks)
            for i in {1..60}; do
              STATUS=$(aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "Status" \
                --output text 2>/dev/null || echo "Pending")
              
              # Show progress every 10 seconds
              if [ $((i % 2)) -eq 0 ]; then
                echo "[$(date +%H:%M:%S)] Status: $STATUS (check $i/60)"
              fi
              
              if [ "$STATUS" = "Success" ]; then
                echo ""
                echo "✅ Migration attempt $attempt SUCCEEDED"
                echo ""
                echo "━━━━━━━━━━━━━━ MIGRATION OUTPUT ━━━━━━━━━━━━━━"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardOutputContent" \
                  --output text
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                return 0
              elif [ "$STATUS" = "Failed" ]; then
                echo ""
                echo "❌ Migration attempt $attempt FAILED"
                echo ""
                echo "━━━━━━━━━━━━━━ ERROR OUTPUT ━━━━━━━━━━━━━━━━"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardOutputContent" \
                  --output text
                echo ""
                echo "━━━━━━━━━━━━━━ STDERR OUTPUT ━━━━━━━━━━━━━━━"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardErrorContent" \
                  --output text
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                return 1
              elif [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
                echo ""
                echo "⚠️  Migration attempt $attempt $STATUS"
                return 1
              fi
              
              sleep 5
            done
            
            echo ""
            echo "⏱️  Migration attempt $attempt TIMED OUT (exceeded 5 minutes)"
            echo "Final status: $STATUS"
            return 1
          }
          
          # Main retry loop: Try up to 3 times with exponential backoff
          MIGRATION_SUCCESS=false
          for attempt in 1 2 3; do
            if run_migration_attempt $attempt; then
              MIGRATION_SUCCESS=true
              echo ""
              echo "╔═══════════════════════════════════════════════════════════╗"
              echo "║   ✅ MIGRATION COMPLETED SUCCESSFULLY (Attempt $attempt)      ║"
              echo "╚═══════════════════════════════════════════════════════════╝"
              break
            else
              if [ $attempt -lt 3 ]; then
                BACKOFF_TIME=$((15 * attempt))
                echo ""
                echo "⏳ Waiting ${BACKOFF_TIME}s before retry attempt $((attempt + 1))..."
                sleep $BACKOFF_TIME
              fi
            fi
          done
          
          # Final check
          if [ "$MIGRATION_SUCCESS" != "true" ]; then
            echo ""
            echo "╔═══════════════════════════════════════════════════════════╗"
            echo "║   ❌ MIGRATION FAILED AFTER 3 ATTEMPTS                    ║"
            echo "╚═══════════════════════════════════════════════════════════╝"
            echo ""
            echo "🔧 Troubleshooting suggestions:"
            echo "  1. Check EC2 instance logs in CloudWatch"
            echo "  2. Verify RDS security group allows EC2 connections"
            echo "  3. Verify DATABASE_URL and DB credentials are correct"
            echo "  4. Check container logs: docker logs backend"
            echo "  5. Manually run: ./migrate.sh --check"
            echo ""
            exit 1
          fi

      - name: Deployment Summary
        run: |
          # Get EC2 public IP
          EC2_IP=$(aws ec2 describe-instances \
            --instance-ids ${{ steps.validate_instance.outputs.instance_id }} \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          
          echo "###  Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Instance ID**: ${{ steps.validate_instance.outputs.instance_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Public IP**: $EC2_IP" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend Image**: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend Image**: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Migrations**:  Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "###  Application URLs" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: http://$EC2_IP" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend API**: http://$EC2_IP:8000" >> $GITHUB_STEP_SUMMARY
          echo "- **SSH Access**: \`ssh -i juma-key.pem ubuntu@$EC2_IP\`" >> $GITHUB_STEP_SUMMARY

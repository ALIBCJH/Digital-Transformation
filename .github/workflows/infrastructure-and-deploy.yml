name: Application CI/CD Pipeline

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Manual trigger

permissions:
  contents: read
  packages: write
  pull-requests: write  # Required for PR comments
  issues: write         # Required for issue/PR comments
  id-token: write       # REQUIRED for OIDC authentication with AWS

env:
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: alibcjh/digital-transformation-backend
  FRONTEND_IMAGE_NAME: alibcjh/digital-transformation-frontend
  AWS_REGION: eu-north-1

jobs:
  # ==========================================
  # NOTE: Terraform infrastructure is now managed in a separate workflow
  # See: .github/workflows/terraform.yml
  # This workflow focuses on application deployment only
  # ==========================================
  
  # ==========================================
  # JOB 1: TEST & LINT
  # ==========================================
  test-and-lint:
    name: Test & Lint Application
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'apps/backend/requirements.txt'
          
      - name: Install Dependencies
        working-directory: ./apps/backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install 'safety>=3.2,<4.0' 'bandit[toml]>=1.7,<2.0'
          
      - name: Linting (Ruff)
        working-directory: ./apps/backend
        run: ruff check . --output-format=github --ignore=E501
        
      - name: Security Audit
        working-directory: ./apps/backend
        run: |
          safety check
          bandit -r . -ll
          
      - name: Run Django Tests
        working-directory: ./apps/backend
        env:
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY || 'test-key-for-ci-only-not-production' }}
          DJANGO_SETTINGS_MODULE: "config.ci_settings"
        run: |
          python manage.py migrate --run-syncdb
          python manage.py test

  # ==========================================
  # JOB 2: BUILD & PUSH DOCKER IMAGES
  # ==========================================
  build-and-push-docker:
    name: Build & Push Docker Images
    needs: [test-and-lint]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- BACKEND IMAGE BUILD ---
      - name: Extract Backend Metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/alibcjh/digital-transformation-backend
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:buildcache,mode=max

      # --- FRONTEND IMAGE BUILD ---
      - name: Extract Frontend Metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/alibcjh/digital-transformation-frontend
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=/api
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:buildcache,mode=max

  # ==========================================
  # JOB 3: DEPLOY TO AWS EC2
  # ==========================================
  deploy-to-aws:
    name: Deploy to AWS EC2
    needs: [build-and-push-docker]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate Instance ID
        id: validate_instance
        run: |
          # Note: Since Terraform runs in a separate workflow, we use the INSTANCE_ID secret
          # Make sure this secret is set in your repository settings
          INSTANCE_ID='${{ secrets.INSTANCE_ID }}'
          
          if [[ "$INSTANCE_ID" =~ ^i-[a-f0-9]{17}$ ]]; then
            echo "✅ Using EC2 Instance ID from secrets: $INSTANCE_ID"
            echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          else
            echo "::error::No valid EC2 instance ID found in secrets.INSTANCE_ID"
            echo "::error::Please ensure INSTANCE_ID is set in repository secrets"
            echo "::error::Current value: '$INSTANCE_ID'"
            exit 1
          fi

      - name: Deploy Frontend & Backend to EC2 via SSM
        env:
          INSTANCE_ID: ${{ steps.validate_instance.outputs.instance_id }}
        run: |
          # Get EC2 Public IP for ALLOWED_HOSTS
          EC2_PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids $INSTANCE_ID \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          
          # Wait for instance to be ready
          aws ec2 wait instance-status-ok --instance-ids $INSTANCE_ID || true
          
          # Wait for SSM agent
          for i in {1..12}; do
            if aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null | grep -q "Online"; then
              break
            fi
            sleep 10
          done
          
          # Encode docker-compose file
          if [ ! -f docker-compose.prod.yml ]; then
            echo "::error::docker-compose.prod.yml not found"
            exit 1
          fi
          
          COMPOSE_B64=$(base64 -w 0 docker-compose.prod.yml)
          if [ -z "$COMPOSE_B64" ]; then
            echo "::error::Failed to encode docker-compose.prod.yml"
            exit 1
          fi
          
          # Send deployment command
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "[{\"Key\":\"InstanceIds\",\"Values\":[\"$INSTANCE_ID\"]}]" \
            --parameters "commands=[
              \"set -e\",
              \"cd /home/ubuntu || cd ~ \",
              \"echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin 2>&1 | grep -i 'login succeeded' || exit 1 \",
              \"echo '${COMPOSE_B64}' | base64 -d > docker-compose.yml \",
              \"if [ ! -s docker-compose.yml ]; then exit 1; fi \",
              \"cat > .env <<'ENV_EOF'\",
              \"# Auto-generated by GitHub Actions - DO NOT EDIT MANUALLY\",
              \"# Last updated: $(date -u +%Y-%m-%dT%H:%M:%SZ)\",
              \"# Commit: ${{ github.sha }}\",
              \"\",
              \"# Docker Images (SHA-tagged for immutability)\",
              \"BACKEND_IMAGE=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:sha-$(echo ${{ github.sha }} | cut -c1-7)\",
              \"FRONTEND_IMAGE=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:sha-$(echo ${{ github.sha }} | cut -c1-7)\",
              \"\",
              \"# Django Configuration\",
              \"DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}\",
              \"DEBUG=False\",
              \"\",
              \"# Database Configuration\",
              \"DATABASE_URL=${{ secrets.DATABASE_URL }}\",
              \"DB_NAME=${{ secrets.DB_NAME }}\",
              \"DB_USER=${{ secrets.DB_USER }}\",
              \"DB_PASSWORD=${{ secrets.DB_PASSWORD }}\",
              \"DB_HOST=${{ secrets.DB_HOST }}\",
              \"DB_PORT=${{ secrets.DB_PORT }}\",
              \"\",
              \"# Security & Host Configuration\",
              \"ALLOWED_HOSTS=localhost,127.0.0.1,backend,${EC2_PUBLIC_IP},${{ secrets.ALLOWED_HOSTS }}\",
              \"SECURE_SSL_REDIRECT=False\",
              \"SESSION_COOKIE_SECURE=False\",
              \"CSRF_COOKIE_SECURE=False\",
              \"ENV_EOF\",
              \"if [ ! -s .env ]; then exit 1; fi \",
              \"if docker compose version >/dev/null 2>&1; then export COMPOSE_CMD='docker compose'; elif docker-compose version >/dev/null 2>&1; then export COMPOSE_CMD='docker-compose'; else exit 1; fi \",
              \"docker stop backend frontend 2>/dev/null || true \",
              \"docker rm -f backend frontend 2>/dev/null || true \",
              \"\$COMPOSE_CMD --env-file .env pull \",
              \"\$COMPOSE_CMD down --remove-orphans 2>/dev/null || true \",
              \"docker network create app-network 2>/dev/null || true \",
              \"\$COMPOSE_CMD --env-file .env up -d \",
              \"sleep 45 \",
              \"if ! docker ps --format '{{.Names}}' | grep -q '^backend$'; then \",
              \"  docker logs backend 2>&1 \",
              \"  exit 1 \",
              \"fi \",
              \"docker image prune -af --filter 'until=24h' \",
              \"docker system prune -f --volumes \"
            ]" \
            --output text \
            --query "Command.CommandId")
          
          # Wait for deployment (max 5 minutes)
          for i in {1..60}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            
            if [ "$STATUS" = "Success" ]; then
              echo "✅ Deployment completed successfully"
              break
            elif [ "$STATUS" = "Failed" ]; then
              echo "::error::Deployment failed"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi
            
            sleep 5
          done
          
          if [ "$STATUS" != "Success" ]; then
            echo "::error::Deployment timed out - status: $STATUS"
            exit 1
          fi

      - name: Run Database Migrations (with Retry Logic)
        env:
          INSTANCE_ID: ${{ steps.validate_instance.outputs.instance_id }}
        run: |
          MIGRATION_SCRIPT=$(cat .github/scripts/run-migrations-robust.sh | base64 -w 0)
          
          run_migration_attempt() {
            local attempt=$1
            
            COMMAND_ID=$(aws ssm send-command \
              --document-name "AWS-RunShellScript" \
              --targets "[{\"Key\":\"InstanceIds\",\"Values\":[\"$INSTANCE_ID\"]}]" \
              --timeout-seconds 300 \
              --parameters "commands=[
                \"cd /home/ubuntu || cd ~ \",
                \"echo '$MIGRATION_SCRIPT' | base64 -d > migrate-run.sh\",
                \"chmod +x migrate-run.sh\",
                \"./migrate-run.sh\"
              ]" \
              --output text \
              --query "Command.CommandId")
            
            for i in {1..60}; do
              STATUS=$(aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "Status" \
                --output text 2>/dev/null || echo "Pending")
              
              if [ "$STATUS" = "Success" ]; then
                echo "✅ Migration attempt $attempt succeeded"
                return 0
              elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardErrorContent" \
                  --output text
                return 1
              fi
              
              sleep 5
            done
            
            return 1
          }
          
          MIGRATION_SUCCESS=false
          for attempt in 1 2 3; do
            if run_migration_attempt $attempt; then
              MIGRATION_SUCCESS=true
              break
            else
              if [ $attempt -lt 3 ]; then
                sleep $((15 * attempt))
              fi
            fi
          done
          
          if [ "$MIGRATION_SUCCESS" != "true" ]; then
            echo "::error::Migration failed after 3 attempts"
            exit 1
          fi

      - name: Deployment Summary
        run: |
          # Get EC2 public IP
          EC2_IP=$(aws ec2 describe-instances \
            --instance-ids ${{ steps.validate_instance.outputs.instance_id }} \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          
          echo "###  Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Instance ID**: ${{ steps.validate_instance.outputs.instance_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Public IP**: $EC2_IP" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend Image**: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend Image**: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Migrations**:  Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "###  Application URLs" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: http://$EC2_IP" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend API**: http://$EC2_IP:8000" >> $GITHUB_STEP_SUMMARY
          echo "- **SSH Access**: \`ssh -i juma-key.pem ubuntu@$EC2_IP\`" >> $GITHUB_STEP_SUMMARY

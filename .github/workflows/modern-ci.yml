name: Modern Python CI (Pull Requests Only)

# This workflow runs on PRs for quick feedback
# Main branch uses Django Production CI for deployment
on:
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      working-directory: ./apps/backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Ruff Linter
      working-directory: ./apps/backend
      run: |
        ruff check . --output-format=github --ignore=E501
    
    - name: Run Ruff Formatter Check
      working-directory: ./apps/backend  
      run: |
        ruff format --check . || echo "::warning::Code formatting issues found, but not blocking"
    
    - name: Run PyTest
      working-directory: ./apps/backend
      env:
        DJANGO_SETTINGS_MODULE: config.ci_settings
      run: |
        # Use SQLite for tests to avoid PostgreSQL setup complexity
        pytest test_modern.py -v --tb=short --cov=core --cov-report=xml
    
    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.12'
      uses: codecov/codecov-action@v3
      with:
        file: ./apps/backend/coverage.xml
        flags: backend
        name: backend-coverage
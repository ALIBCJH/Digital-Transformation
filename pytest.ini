[pytest]
# DJANGO_SETTINGS_MODULE can be overridden via environment variable
# Defaults to config.settings for local dev, config.ci_settings in CI
python_files = tests.py test_*.py *_tests.py
addopts = --strict-markers --strict-config --verbose --tb=short
testpaths = apps/backend
markers = 
    slow: marks tests as slow
    integration: marks tests as integration tests